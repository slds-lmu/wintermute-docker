# starship-extra.toml — appended onto starship's `plain-text-symbols` preset
# at build time to produce /home/yolo/.config/starship.toml.
#
# Why split: the preset replaces Nerd Font glyphs with text so the prompt
# renders on any terminal (no Nerd Font assumption). These overrides layer
# user-facing structure (two-line prompt, smarter directory truncation, quiet
# cmd_duration) on top.
#
# Ported from sysadmin/stow/shell/.config/starship.toml.

# Two-line prompt: info on top, just `$` on the line you type on.
# Avoids the prompt running off the right when paths get long.
# Leads with the yolobox badge (see [custom.yolobox]) so it is obvious at a
# glance that this shell is inside the sandbox.
format = """
${custom.yolobox}\
$directory\
$git_branch\
$git_status\
$rust\
$python\
$nodejs\
$cmd_duration\
$line_break\
$character"""

# Badge that marks a shell running inside the yolobox sandbox. yolobox exports
# YOLOBOX=1, so `when` lights the module up only in the box and leaves the prompt
# untouched when this same config is used elsewhere (it is ported from sysadmin
# dotfiles). starship 1.25's custom modules have no `detect_env_vars`, so we gate
# on a tiny `test` instead. 🎲 is yolobox's own mark (its banner/MOTD use it).
[custom.yolobox]
description = "Show a badge when inside the yolobox sandbox (YOLOBOX env var)"
when = "test -n \"$YOLOBOX\""
format = "[🎲 yolobox]($style) "
style = "bold yellow"

# Don't show duration for fast commands.
[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "

# Truncate long path segments at the boundary (parent dirs only).
[directory]
truncation_length = 4
truncation_symbol = "…/"
